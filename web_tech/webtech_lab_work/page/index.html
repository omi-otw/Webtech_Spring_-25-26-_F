<!DOCTYPE html>
<html>
<head>
    <title>Product Management Page</title>
    <link rel="stylesheet" href="/web_tech/webtech_lab_work/design/style.css">
</head>
<body>
 
<div class="box">
    <h3>Product Management Page</h3>
 
    <label>Unit Price:</label>
    <input type="text" id="unitPrice" value="1000" readonly>
 
    <label>Quantity per Day:</label>
    <input type="number" id="quantity" placeholder="Enter quantity per day">
 
    <label>Total Price for 30 Days:</label>
    <input type="text" id="totalPrice" value="0" readonly>
 
</div>
 
<script src="/web_tech/webtech_lab_work/js/script.js"></script>
 
</body>
</html>
